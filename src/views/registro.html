<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gestor de Citas | Organiza tus reservas fácilmente</title>
    <meta name="description" content="Gestiona tus citas, reservas y horarios de forma rápida y sencilla con nuestro gestor online. Organiza todo en un solo lugar.">
    <meta name="keywords" content="gestor de citas, reservas online, agenda digital, citas online, organizar citas">
    <meta name="author" content="Rebeca">

    <meta name="robots" content="index, follow">

    <link rel="stylesheet" href="../../public/assets/css/registro.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="../../public/assets/js/registro.js"></script>
</head>
<body>
     <header>
    <nav>
        <div class="izq">
           <a href="../../public/index.html">
             <img src="../../public/assets/img/Logo-Nexo.png" alt="Logo-nexo">
           </a>
        </div>
         <div class="menu">
            <a href="/src/views/sobreNosotros.html">Sobre nosotros</a> 
            <a href="/src/views/registro.html">Regístrate</a> 
            <a href="/src/views/login.html">Iniciar sesión</a>
        </div>
    </nav>
   </header>

  <main>
  <section>
    <div class="contenedor">
      <div class="envoltorio">

        <ul class="pasos">
          <li class="activo">Datos personales</li>
          <li>Acceso</li>
          <li>Finalizar</li>
        </ul>

        <form class="formulario" method="post" action="#">

          <!-- PASO 1 -->
          <fieldset class="seccion activo">
            <h3>Datos personales</h3>

            <input type="text" name="nombre" placeholder="Nombre y apellidos" required>
            <input type="email" name="correo" placeholder="Correo electrónico" required>
            <input type="tel" name="telefono" placeholder="Teléfono" required>

            <p class="etiqueta-radio">Género</p>

            <div class="fila cf">
              <div class="cuatro columna">
                <input type="radio" name="genero" id="hombre" value="Hombre" required>
                <label for="hombre"><h4>Hombre</h4></label>
              </div>

              <div class="cuatro columna">
                <input type="radio" name="genero" id="mujer" value="Mujer">
                <label for="mujer"><h4>Mujer</h4></label>
              </div>

              <div class="cuatro columna">
                <input type="radio" name="genero" id="otro" value="Otro">
                <label for="otro"><h4>Otro</h4></label>
              </div>
            </div>

            <button type="button" class="btn-siguiente">Siguiente</button>
          </fieldset>

          <!-- PASO 2 -->
          <fieldset class="seccion">
            <h3>Credenciales de acceso</h3>

            <div class="contenedor-password">
              <input type="password" id="password" name="password" placeholder="Contraseña" required>
              <img src="../../public/assets/img/ojo-abierto.png" class="mostrar-password" data-target="password" alt="Mostrar contraseña">
            </div>

            <div class="contenedor-password">
              <input type="password" id="password2" name="password2" placeholder="Repetir contraseña" required>
              <img src="../../public/assets/img/ojo-abierto.png" class="mostrar-password" data-target="password2" alt="Mostrar contraseña">
            </div>

            <p class="hint">
              La contraseña se almacenará cifrada por seguridad.
            </p>

            <button type="button" class="btn-siguiente">Siguiente</button>
          </fieldset>

          <!-- PASO 3 -->
          <fieldset class="seccion">
            <h3>¡Cuenta creada!</h3>
            <p>Tu registro se ha completado correctamente.</p>

            <button class="btn-enviar" type="submit">Iniciar Sesión</button>
          </fieldset>

        </form>
      </div>
    </div>
  </section>
</main>


    <footer class="footer">
    <p>Gestor de Citas © 2026</p>
    <a href="https://github.com/Rebecarebeca2005/Gestor-citas.git" target="_blank">
        Ver en GitHub
    </a>
</footer>
</body>
</html>
