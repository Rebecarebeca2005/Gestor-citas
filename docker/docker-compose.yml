version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_gestor
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestor_citas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_gestor
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

  web:
    image: php:8.2-apache
    container_name: web_gestor
    ports:
      - "8000:80"
    volumes:
      - ../public:/var/www/html
    depends_on:
      - db

volumes:
  db_data: