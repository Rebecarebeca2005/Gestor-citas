version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_gestor
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gestor_citas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_gestor
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root

  web:
    build: .
    container_name: web_gestor
    ports:
      - "8000:80"
    volumes:
      - ../:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: gestor_citas
      DB_USER: root
      DB_PASS: root
      DB_PORT: 3306

volumes:
  db_data: